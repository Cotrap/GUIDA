<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="description" content="Guida completa alla piattaforma Itineris per la gestione del trasporto pubblico COTRAP: linee, corse, bigliettazione e sezione contabile."/>
    <link rel="icon" href="img/icona01.png" type="image/png"/>
    <link href="css/style.css" rel="stylesheet"/>
    <title>Guida ITINERIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Overlay per mobile menu -->
    <div class="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Header -->
    <header>
        <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
            <span class="hamburger"></span>
        </button>
        <h1 id="titolo">GUIDA ITINERIS</h1>
        <span class="version-badge" id="versionBadge">v2.0</span>
    </header>

    <!-- Barra di ricerca -->
    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Cerca nella guida..." autocomplete="off">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Menu laterale -->
    <nav class="menu" id="sideMenu">
        <ul id="menuList">
            <!-- Menu generato dinamicamente -->
        </ul>
    </nav>

    <!-- Menu orizzontale sottosezioni -->
    <div class="horizontal-menu">
        <ul id="horizontalMenuList"></ul>
    </div>

    <!-- Contenuto principale -->
    <main class="content" id="content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Caricamento...</p>
        </div>
        <article id="articleContent"></article>
    </main>

    <!-- Pulsante torna su -->
    <button id="scrollToTop" title="Torna su">⬆</button>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Fallback senza JavaScript -->
    <noscript>
        <div style="text-align:center; padding:4rem 2rem; font-family:sans-serif;">
            <h1 style="color:#2563eb;">Guida ITINERIS</h1>
            <p style="color:#64748b; margin-top:1rem;">Per visualizzare la guida è necessario abilitare JavaScript nel browser.</p>
        </div>
    </noscript>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
